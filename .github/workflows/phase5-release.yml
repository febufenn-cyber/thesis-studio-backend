name: Phase 5 Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
      expected_sha:
        description: Exact validated main commit SHA to deploy
        required: true
        type: string
      canary_institution:
        description: Optional canary institution UUID
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: phase5-release-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_sha }}
          fetch-depth: 0
      - name: Verify immutable target is on main
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_sha }}"
          git fetch origin main
          git merge-base --is-ancestor "${{ inputs.expected_sha }}" origin/main
      - name: Require durable main validation attestation
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/contents/release-candidates/${EXPECTED_SHA}.json?ref=main" \
            --jq .content | tr -d '\n' | base64 -d > /tmp/release-attestation.json
          python - <<'PY'
          import json, os
          report = json.load(open('/tmp/release-attestation.json'))
          assert report['sha'] == os.environ['EXPECTED_SHA']
          assert report['failures'] == 0 and report['errors'] == 0
          assert report['image_build'] == 'passed'
          assert report['deployment_triggered'] is False
          print(json.dumps(report, indent=2, sort_keys=True))
          PY
      - name: Reject attestation-only commits as deployment targets
        shell: bash
        run: |
          set -euo pipefail
          # Attestation commits touch only release-candidates/ — they carry no
          # application code and must never be deployed as the application.
          changed=$(git diff --name-only "${{ inputs.expected_sha }}^" "${{ inputs.expected_sha }}")
          test -n "$changed"
          if ! echo "$changed" | grep -qv '^release-candidates/'; then
            echo "::error::${{ inputs.expected_sha }} is an attestation-only commit; deploy the application commit it attests instead (see scripts/latest_attested_release.py)."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install and validate exact source
        run: |
          pip install -r requirements.txt
          python -m compileall -q app tests scripts
          pytest -q
      - name: Migration expansion/rollback validation
        env:
          DATABASE_URL: ${{ secrets.RELEASE_VALIDATION_DATABASE_URL }}
          JWT_SECRET: release-validation-secret-32-chars-minimum
          ANTHROPIC_API_KEY: release-validation-placeholder
          ENV: staging
          STORAGE_BACKEND: local
          MALWARE_SCAN_MODE: disabled
          PRODUCTION_REQUIRE_MALWARE_SCAN: 'false'
        run: |
          alembic upgrade head
          alembic downgrade 0016
          alembic upgrade head
      - name: Compute immutable image reference
        id: image
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}:${{ inputs.expected_sha }}" >> "$GITHUB_OUTPUT"
      - name: Authenticate container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - name: Build and push multi-architecture release image
        env:
          IMAGE: ${{ steps.image.outputs.value }}
        run: |
          set -euo pipefail
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          # One invocation builds both platforms from the same checkout with
          # identical RELEASE_SHA/BUILD_TIME baked into both images.
          docker buildx build \
            --file Dockerfile.phase5 \
            --platform linux/amd64,linux/arm64 \
            --build-arg RELEASE_SHA=${{ inputs.expected_sha }} \
            --build-arg BUILD_TIME="$BUILD_TIME" \
            --provenance=false \
            --tag "$IMAGE" \
            --push .
      - name: Verify manifest covers amd64 and arm64, record digests
        env:
          IMAGE: ${{ steps.image.outputs.value }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$IMAGE" --raw > /tmp/manifest.json
          export MANIFEST_DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}' | python -c "import json,sys; print(json.load(sys.stdin)['digest'])")
          python - <<'PY'
          import json, os
          index = json.load(open('/tmp/manifest.json'))
          platforms = {
              f"{m['platform']['os']}/{m['platform']['architecture']}": m['digest']
              for m in index['manifests']
              if m['platform']['architecture'] != 'unknown'
          }
          assert 'linux/amd64' in platforms, platforms
          assert 'linux/arm64' in platforms, platforms
          evidence = {
              'schema': 'robofox.release-image-manifest.v1',
              'image': os.environ['IMAGE'],
              'manifest_digest': os.environ['MANIFEST_DIGEST'],
              'platform_digests': platforms,
              'release_sha': os.environ['EXPECTED_SHA'],
              'build_time': os.environ['BUILD_TIME'],
          }
          json.dump(evidence, open('/tmp/release-image-manifest.json', 'w'), indent=2, sort_keys=True)
          print(json.dumps(evidence, indent=2, sort_keys=True))
          PY
      - name: Upload image manifest evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-image-manifest-${{ inputs.expected_sha }}
          path: /tmp/release-image-manifest.json

  deploy-staging:
    if: inputs.environment == 'staging'
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_sha }}
      - name: Deploy through audited remote release command
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            export ROBOFOX_IMAGE='${{ needs.verify.outputs.image }}'
            export CLAMAV_IMAGE='${{ secrets.CLAMAV_IMAGE }}'
            export BACKUP_EVIDENCE_HOST_PATH=/dev/null
            export ROBOFOX_ENV_FILE='${{ secrets.STAGING_ENV_PATH }}'
            cd '${{ secrets.STAGING_DEPLOY_PATH }}'
            docker compose -f deploy/compose.phase5.yml pull
            docker compose -f deploy/compose.phase5.yml run --rm web-a python scripts/verify_phase5_environment.py --target staging
            docker compose -f deploy/compose.phase5.yml up -d --remove-orphans
      - name: Staging smoke test
        run: python scripts/phase5_smoke.py --base-url '${{ secrets.STAGING_BASE_URL }}' --expected-release '${{ inputs.expected_sha }}'

  deploy-production:
    if: inputs.environment == 'production'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_sha }}
      - name: Validate encoded backup evidence
        env:
          BACKUP_EVIDENCE_B64: ${{ secrets.LATEST_BACKUP_EVIDENCE_B64 }}
        run: |
          test -n "$BACKUP_EVIDENCE_B64"
          printf '%s' "$BACKUP_EVIDENCE_B64" | base64 -d | python -m json.tool >/dev/null
      - name: Deploy canary or first application instance
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script_stop: true
          script: |
            install -d -m 700 "$(dirname '${{ secrets.PRODUCTION_BACKUP_EVIDENCE_PATH }}')"
            printf '%s' '${{ secrets.LATEST_BACKUP_EVIDENCE_B64 }}' | base64 -d > '${{ secrets.PRODUCTION_BACKUP_EVIDENCE_PATH }}'
            chmod 600 '${{ secrets.PRODUCTION_BACKUP_EVIDENCE_PATH }}'
            export ROBOFOX_IMAGE='${{ needs.verify.outputs.image }}'
            export CLAMAV_IMAGE='${{ secrets.CLAMAV_IMAGE }}'
            export BACKUP_EVIDENCE_HOST_PATH='${{ secrets.PRODUCTION_BACKUP_EVIDENCE_PATH }}'
            export ROBOFOX_ENV_FILE='${{ secrets.PRODUCTION_ENV_PATH }}'
            export CANARY_INSTITUTION='${{ inputs.canary_institution }}'
            cd '${{ secrets.PRODUCTION_DEPLOY_PATH }}'
            docker compose -f deploy/compose.phase5.yml pull
            docker compose -f deploy/compose.phase5.yml run --rm web-a python scripts/verify_phase5_environment.py --target production
            docker compose -f deploy/compose.phase5.yml up -d web-a worker-general worker-ai worker-pdf maintenance
      - name: Canary smoke test
        run: python scripts/phase5_smoke.py --base-url '${{ secrets.PRODUCTION_CANARY_BASE_URL }}' --expected-release '${{ inputs.expected_sha }}'
      - name: Complete rolling application deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script_stop: true
          script: |
            export ROBOFOX_IMAGE='${{ needs.verify.outputs.image }}'
            export CLAMAV_IMAGE='${{ secrets.CLAMAV_IMAGE }}'
            export BACKUP_EVIDENCE_HOST_PATH='${{ secrets.PRODUCTION_BACKUP_EVIDENCE_PATH }}'
            export ROBOFOX_ENV_FILE='${{ secrets.PRODUCTION_ENV_PATH }}'
            cd '${{ secrets.PRODUCTION_DEPLOY_PATH }}'
            docker compose -f deploy/compose.phase5.yml up -d web-b
      - name: Production verification
        run: python scripts/phase5_smoke.py --base-url '${{ secrets.PRODUCTION_BASE_URL }}' --expected-release '${{ inputs.expected_sha }}'

# GitHub environment protection must require human approval for production.
# This workflow never runs on push and never enables auto-merge.
