name: Phase 5 Validation Attestation

on:
  push:
    branches:
      - agent/phase-5-commercial-reliability

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: phase5-attestation-${{ github.sha }}
  cancel-in-progress: true

jobs:
  attest:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for successful exact-head validation
        id: validation
        uses: actions/github-script@v7
        with:
          script: |
            const deadline = Date.now() + 50 * 60 * 1000;
            while (Date.now() < deadline) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: context.sha,
                per_page: 100,
              });
              const run = data.workflow_runs.find(row => row.name === 'Phase 5 Final Validation');
              if (run && run.status === 'completed') {
                if (run.conclusion !== 'success') {
                  core.setFailed(`Exact-head validation concluded ${run.conclusion}; no attestation will be written.`);
                  return;
                }
                core.setOutput('run_id', String(run.id));
                core.setOutput('run_url', run.html_url);
                return;
              }
              await new Promise(resolve => setTimeout(resolve, 20000));
            }
            core.setFailed('Timed out waiting for exact-head validation.');
      - name: Download exact-head validation artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.validation.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '.artifacts[] | select(.name | startswith("phase5-final-validation-")) | .id' | head -n1)
          test -n "$artifact_id"
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/phase5-validation.zip
          mkdir -p /tmp/phase5-validation
          unzip -q /tmp/phase5-validation.zip -d /tmp/phase5-validation
          test -f /tmp/phase5-validation/phase5-validation.json
      - name: Build durable attestation
        env:
          VALIDATED_SHA: ${{ github.sha }}
          VALIDATION_RUN: ${{ steps.validation.outputs.run_url }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path('/tmp/phase5-validation/phase5-validation.json').read_text())
          assert data['sha'] == os.environ['VALIDATED_SHA']
          assert data['failures'] == 0 and data['errors'] == 0
          body = f'''# Phase 5 Exact-Head Validation Attestation

          Validated implementation commit: `{data['sha']}`

          - Python tests: **{data['tests']}**
          - Failures: **{data['failures']}**
          - Errors: **{data['errors']}**
          - Skipped: **{data['skipped']}**
          - Migration: **{data['migration']}**
          - Security gates: **{data['security']}**
          - Deployment triggered: **No**
          - Validation run: {os.environ['VALIDATION_RUN']}

          This file is generated only after the exact implementation commit passes the complete Phase 1–5 regression/acceptance suite, migration rollback, JavaScript checks and security gates. The commit adding this report changes documentation only and uses `[skip ci]`.
          '''
          Path('/tmp/PHASE5-VALIDATED.md').write_text('\n'.join(line.strip() for line in body.splitlines()) + '\n')
          PY
      - name: Commit validation attestation to Phase 5 branch
        uses: actions/github-script@v7
        env:
          VALIDATED_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const path = 'PHASE5-VALIDATED.md';
            const content = Buffer.from(fs.readFileSync('/tmp/PHASE5-VALIDATED.md', 'utf8')).toString('base64');
            let sha;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'agent/phase-5-commercial-reliability',
              });
              sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch: 'agent/phase-5-commercial-reliability',
              message: `docs: attest Phase 5 validation for ${process.env.VALIDATED_SHA} [skip ci]`,
              content,
              sha,
            });
