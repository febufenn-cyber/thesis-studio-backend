name: Phase 5 Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install application and security scanners
        run: |
          pip install -r requirements.txt
          pip install pip-audit bandit
      - name: Dependency vulnerability audit
        shell: bash
        run: |
          set -o pipefail
          pip-audit -r requirements.txt --strict 2>&1 | tee /tmp/pip-audit.log
      - name: Static application security scan
        shell: bash
        run: |
          set -o pipefail
          bandit -r app -x tests -ll -ii 2>&1 | tee /tmp/bandit.log
      - name: Secret pattern check
        shell: bash
        run: |
          set -o pipefail
          python scripts/check_secret_patterns.py 2>&1 | tee /tmp/secret-patterns.log
      - name: Production configuration safety test
        shell: bash
        env:
          ENV: production
          DEBUG: "false"
          DATABASE_URL: postgresql+asyncpg://service:password@managed-db.example.invalid:5432/thesis?ssl=require
          JWT_SECRET: 0123456789abcdef0123456789abcdef
          RELEASE_SHA: 0123456789abcdef0123456789abcdef01234567
          BUILD_TIME: 2026-07-12T00:00:00+00:00
          STORAGE_BACKEND: r2
          R2_ACCOUNT_ID: test-account
          R2_ACCESS_KEY_ID: test-access-key
          R2_SECRET_ACCESS_KEY: test-secret-key
          R2_BUCKET_NAME: test-bucket
          BILLING_PROVIDER: manual
          RESEND_API_KEY: re_test_release_candidate
          PRIVACY_HASH_PEPPER: test-privacy-pepper
          FRONTEND_URL: https://thesis.example.invalid
          CORS_ORIGINS: https://thesis.example.invalid
          MALWARE_SCAN_MODE: clamav
          CLAMAV_HOST: clamav.internal
          AI_GLOBAL_ENABLED: "false"
        run: |
          echo '{"backup":"test-only"}' > /tmp/backup-evidence.json
          export BACKUP_EVIDENCE_PATH=/tmp/backup-evidence.json
          python scripts/verify_phase5_environment.py --target production
      - name: Upload security diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-security-${{ github.sha }}
          path: |
            /tmp/pip-audit.log
            /tmp/bandit.log
            /tmp/secret-patterns.log
          if-no-files-found: ignore
