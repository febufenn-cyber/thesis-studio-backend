# Staging host-level load balancer in front of web-a/web-b (which bind
# 127.0.0.1:8101/8102 in deploy/compose.phase5.yml). cloudflared points at
# 127.0.0.1:8100; nginx provides the health-aware routing the topology
# requires. Install: /etc/nginx/sites-available/thesis-staging + symlink.

upstream thesis_staging_web {
    server 127.0.0.1:8101 max_fails=2 fail_timeout=10s;
    server 127.0.0.1:8102 max_fails=2 fail_timeout=10s;
}

server {
    listen 127.0.0.1:8100;
    server_name thesis-staging.robofox.online;

    client_max_body_size 25m;          # manuscript uploads
    proxy_read_timeout 120s;           # preview/export polling headroom

    location / {
        proxy_pass http://thesis_staging_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout http_502 http_503;
    }
}
