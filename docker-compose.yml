version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: thesis-postgres
    environment:
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis
      POSTGRES_DB: thesis_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesis"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: thesis-postgres-test
    environment:
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis
      POSTGRES_DB: thesis_studio_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # in-memory; tests are throwaway

volumes:
  postgres_data:
